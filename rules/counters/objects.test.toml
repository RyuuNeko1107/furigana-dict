test = [
  { input = "1本", expected = "いっぽん" },
  { input = "3本", expected = "さんぼん" },
  { input = "5本", expected = "ごほん" },
  { input = "1匹", expected = "いっぴき" },
  { input = "3匹", expected = "さんびき" },
  { input = "1冊", expected = "いっさつ" },
]
