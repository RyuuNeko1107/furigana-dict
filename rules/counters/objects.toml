# 物を数える助数詞 (本 / 匹 / 杯 / 個 / 歳 / 冊)

# ─── 本 ────────────────────────────────────────────────────────────────────
[counter."本"]
default = "ホン"

[[counter."本".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ポン"
sokuonize = true

[[counter."本".rules]]
last_digit = [3]
suffix = "ボン"

# ─── 匹 ────────────────────────────────────────────────────────────────────
[counter."匹"]
default = "ヒキ"

[[counter."匹".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ピキ"
sokuonize = true

[[counter."匹".rules]]
last_digit = [3]
suffix = "ビキ"

# ─── 杯 ────────────────────────────────────────────────────────────────────
[counter."杯"]
default = "ハイ"

[[counter."杯".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パイ"
sokuonize = true

[[counter."杯".rules]]
last_digit = [3]
suffix = "バイ"

# ─── 個 ────────────────────────────────────────────────────────────────────
[counter."個"]
default = "コ"

[[counter."個".rules]]
last_digit = [1, 6, 8, 0]
suffix = "コ"
sokuonize = true

# ─── 歳 ────────────────────────────────────────────────────────────────────
[counter."歳"]
default = "サイ"

[[counter."歳".rules]]
last_digit = [1, 8, 0]
suffix = "サイ"
sokuonize = true

# ─── 冊 ────────────────────────────────────────────────────────────────────
[counter."冊"]
default = "サツ"

[[counter."冊".rules]]
last_digit = [1, 8, 0]
suffix = "サツ"
sokuonize = true

# ─── inline test (この file が担当する読みのロック) ───────────────────────────
# tools/test_inline_rules.py が CI で各 case を binary に流して expected と比較。
# input は実テキスト、 expected は hiragana mode の出力。

[[test]]
input = "1本"
expected = "いっぽん"

[[test]]
input = "3本"
expected = "さんぼん"

[[test]]
input = "5本"
expected = "ごほん"

[[test]]
input = "1匹"
expected = "いっぴき"

[[test]]
input = "3匹"
expected = "さんびき"

[[test]]
input = "1冊"
expected = "いっさつ"
