# 単純な読み固定化 (形態素解析が外しがちな語)
#
# 文脈分岐は無く default のみで固定する語をまとめる。
# 「何○○」「日付・暦」「人名混同しがちな熟語」等。

# ─── 大人 ──────────────────────────────────────────────────────────────
[[rule]]
surface = "大人"
default = "オトナ"

# ─── 何日 / 何人 / 何回 / 何度 ────────────────────────────────────────
[[rule]]
surface = "何日"
default = "ナンニチ"

[[rule]]
surface = "何人"
default = "ナンニン"

[[rule]]
surface = "何回"
default = "ナンカイ"

[[rule]]
surface = "何度"
default = "ナンド"

# ─── 仲人 / 素人 / 玄人 ──────────────────────────────────────────────
[[rule]]
surface = "仲人"
default = "ナコウド"

[[rule]]
surface = "素人"
default = "シロウト"

[[rule]]
surface = "玄人"
default = "クロウト"

# ─── 日本 ──────────────────────────────────────────────────────────────
[[rule]]
surface = "日本"
default = "ニホン"

# ─── 検証ループ補強: 単漢字が動詞・形容詞活用で誤認されるのを上書き ────

# 能: 動詞「能う (アタウ)」と誤認されがち
[[rule]]
surface = "能"
default = "ノウ"

# 約: 形容動詞「約やか (ツヅマヤカ)」と誤認されがち
[[rule]]
surface = "約"
default = "ヤク"

# 差: 動詞「差す (サス)」と誤認されがち
[[rule]]
surface = "差"
default = "サ"

# 本: 訓読み「もと」に倒れることが多い (起源の意)
# 書籍・冊子の「ホン」をデフォルトに
[[rule]]
surface = "本"
default = "ホン"

# 率: 動詞「率いる (ヒキイル)」と誤認されがち
[[rule]]
surface = "率"
default = "リツ"

# 半: 訓読み「ナカバ」に倒れがち (時刻・割合の「ハン」)
[[rule]]
surface = "半"
default = "ハン"

# 屋: 訓読み「オク」(古語) に倒れがち。蕎麦屋・酒屋など店舗の「ヤ」
[[rule]]
surface = "屋"
default = "ヤ"

# 者: 訓読み「モノ」に倒れがち (研究者・参加者の「シャ」)
[[rule]]
surface = "者"
default = "シャ"

# 市場: 文脈で シジョウ / イチバ
# 名詞 (default) は シジョウ (株式市場・金融市場)、固有名詞地名 + 市場 は jukugo 側で個別対応
[[rule]]
surface = "市場"
default = "シジョウ"

# ─── 今日 / 明日 / 昨日 / 今年 / 去年 / 来年 / 今月 ───────────────────
[[rule]]
surface = "今日"
default = "キョウ"

[[rule]]
surface = "明日"
default = "アシタ"

[[rule]]
surface = "昨日"
default = "キノウ"

[[rule]]
surface = "今年"
default = "コトシ"

[[rule]]
surface = "去年"
default = "キョネン"

[[rule]]
surface = "来年"
default = "ライネン"

[[rule]]
surface = "今月"
default = "コンゲツ"
