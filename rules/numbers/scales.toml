# 大数スケール (大→小 順)
#
# ## 用途
#
# 「N 万 / N 億 / N 兆」 のような **数値 + 大数単位** の合成読みに使う scale 表。
# 各 entry の `kanji` 表記の後に数値を連結する surface (例: 「3 万円」 「5 億ドル」)
# を 1 chunk として処理し、 数値読み + scale 読み + 末尾 unit で合成する。
#
# 例:
#   「3 万円」 → サンマンエン (= 3 サン + 万 マン + 円 エン)
#   「5 億」 → ゴオク
#   「1 兆 8 千億」 → イッチョウ ハッセンオク (= 「兆」 で促音化、 「億」 はそのまま)
#
# ## どのとき発火するか
#
# lib の chunks/split() で `NUM_PAT + (scale_kanji) + (optional 漢字 unit)` regex
# が match した時、 1 chunk として scale_reading() に流される。 chunk 全体で
# 1 unit = lib 内蔵の 「兆 の前で 1/8/0 を促音化」 logic 等が走る。
#
# ## 追加するなら
#
# - 順序は **大 → 小** (= 「無量大数 (10^68) → ... → 億 (10^8) → 万 (10^4)」)
# - `kanji` は scale 表記 (= TOML key)、 `kana` は読み
# - 大数の数値階梯 (10^4 刻み) で抜けがないこと、 lib 内蔵の大数換算 logic と整合
# - 連濁 / 促音化が要る scale (例: 「百 → ヒャク → ヒャッピャク?」 はここではなく
#   lib の number_to_katakana 内 specials 等で処理する)
#
# ## 注意点
#
# - 「百」 「千」 は 10^4 未満なので **本 table に置かない** (= digit.rs の
#   内蔵 SEN / HYAKU table で処理)
# - 「光年」 「平方キロメートル」 等の単位は scale じゃなく units.toml の領域


[meta]
schema_version = "2"
role = "scales"
description = "大数スケール (万 / 億 / 兆 / 京 / 垓 / 不可思議 / 無量大数 等、 大→小順、 N+漢字単位 連結用)"

