# 日付 (1〜31 日) の特殊読み
#
# ## 用途
#
# 日付文脈で 「1 日 → ツイタチ」 「20 日 → ハツカ」 のような特殊読みを定義。
# 一般 counter としての 「日」 = 「ニチ」 (= "1 日 = イチニチ") と区別される。
#
# 例:
#   「6 月 1 日」 → ロクガツ ツイタチ (= 暦の日付)
#   「1 日に 2 回」 → イチニチ ニ ニカイ (= 期間の 1 日)
#
# ## どのとき発火するか
#
# lib の chunks/split() で 「Y 年 M 月 D 日」 / 「M 月 D 日」 が date pattern と
# して認識された **内部** でこの table が引かれる (= 暦の日付限定)。
# 単独の 「N 日」 (例: 「1 日に 2 回」 のような期間表現) は table を bypass して
# default 「ニチ」 を使う (= 動作が違う、 chunks の counter pipeline 側で処理)。
#
# ## 追加するなら
#
# 1〜31 全て明示済み、 通常 entry 追加は無い。 もし「32 日」 のような out-of-range
# が要るなら entry 追加可能 (= lib は string key で lookup、 範囲は規定しない)。
#
# ## 注意点
#
# - key は **数値の文字列表現** (= `"1"`、 not 「1」 / 「一」 / 「０１」)
# - 「20 日」 = ハツカ のような **完全置換** (= 数値読み + 助数詞 連結ではない)
# - file が削除されても lib は 「N 日 = N の数字読み + ニチ」 で fallback、
#   ただし 「1 日 = ツイタチ」 「20 日 = ハツカ」 のような不規則読みは失われる

[meta]
schema_version = "2"
role = "days"
description = "1〜31 日の特殊読み (1→ツイタチ / 20→ハツカ 等)"

[entries]
"1"  = "ツイタチ"
"2"  = "フツカ"
"3"  = "ミッカ"
"4"  = "ヨッカ"
"5"  = "イツカ"
"6"  = "ムイカ"
"7"  = "ナノカ"
"8"  = "ヨウカ"
"9"  = "ココノカ"
"10" = "トオカ"
"11" = "ジュウイチニチ"
"12" = "ジュウニニチ"
"13" = "ジュウサンニチ"
"14" = "ジュウヨッカ"
"15" = "ジュウゴニチ"
"16" = "ジュウロクニチ"
"17" = "ジュウシチニチ"
"18" = "ジュウハチニチ"
"19" = "ジュウクニチ"
"20" = "ハツカ"
"21" = "ニジュウイチニチ"
"22" = "ニジュウニニチ"
"23" = "ニジュウサンニチ"
"24" = "ニジュウヨッカ"
"25" = "ニジュウゴニチ"
"26" = "ニジュウロクニチ"
