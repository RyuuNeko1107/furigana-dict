# 記号 1 文字読み
#
# ## 用途
#
# 「+ → プラス」 「% → パーセント」 のような **記号 1 文字 → 読み** の table。
# 数値 + 記号の合成 (例: 「+3 → プラス サン」 「5% → ゴ パーセント」) や、 単独
# 記号 (例: 「3〜5 → サン から ゴ」) の reading に使う。
#
# 例:
#   「+5」  → プラス ゴ
#   「-3」  → マイナス サン
#   「50%」 → ゴジュッパーセント
#   「3〜5」 → サン から ゴ
#
# ## どのとき発火するか
#
# lib の chunks/split() の symbols 階層 (= 7 番目、 数値 chunks の後) で 1 文字
# ずつ lookup。 hit すれば 1 chunk として reading 確定、 miss なら次の階層
# (digit_re or pass-through) に流れる。
#
# ## 追加するなら
#
# - 既存 entry と被らない **1 文字記号** を `"X" = "読み"` 形式で追加
# - 全角 / 半角は別 entry (= 「~」 半角 と 「〜」 全角は両方登録要)
# - 慣用読みがある記号のみ (= 「@」 や 「&」 は読まない方が無難、 caller 側 TTS engine
#   に任せる)
#
# ## 注意点
#
# - **1 文字 surface 限定** (= 「+-」 のような複数文字組み合わせは entries に置かない、
#   数値 + 記号合成は lib の chunks 内 logic で動的に処理)
# - 「±」 のような合成記号は **単独 1 文字** として登録 (= 「プラスマイナス」 1 chunk)
# - 算術文脈で曖昧な記号 (例: 「-」 = マイナス vs ハイフン) は default の 「マイナス」 で
#   fallback、 個別 disambiguation は caller / postprocess 側で

[meta]
schema_version = "2"
role = "symbols"
description = "記号 1 文字読み (+ / − / % / ‰ / 〜 / ・ / ※ 等、 chunks/split() の symbols 階層で個別 hit)"

[entries]
"+" = "プラス"
"-" = "マイナス"
"±" = "プラスマイナス"
"%" = "パーセント"
"‰" = "パーミル"
"/" = "スラッシュ"
"〜" = "から"
"~" = "から"
"・" = "ナカグロ"
"※" = "コメ"
