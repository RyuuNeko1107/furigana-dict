name: Dedup compat + Regen STATS.md / STATS_DUPS.md

# 辞書 (core/) / ルール (rules/) / 該当 tools/*.py のいずれかが master に push
# されたら、 順に:
#
#   1. compat 異体字 entries の dedup (unihan + jukugo + works)
#   2. STATS.md / STATS_DUPS.md の再生成
#
# を走らせて diff があれば一括 auto-commit する。 dedup は冪等で、 dead 経路の
# entries が無ければ no-op。 contributor が PR で誤って異体字 surface を追加
# しても、 CI が自動で標準形に置換 / 削除する。
#
# bot 自身の commit は `[skip stats]` を含むので再 trigger されない。
# 既存 commit に手で `[skip stats]` を入れたい場合 (release commit 等) もスキップされる。
#
# ## branch protection bypass (PAT 必要)
#
# master に required status checks が設定されているため、 default の `GITHUB_TOKEN`
# (= github-actions[bot]) では auto-commit push が reject される
# (`Protected branch update failed: 4 of 4 required status checks are expected`)。
# admin user の PAT で push する形に変更:
#
# 1. user (admin) が PAT を生成 — Settings → Developer settings → Personal access
#    tokens → Tokens (classic) → Generate new token、 scope は `repo` (full control
#    of private repositories)、 expiration は適宜 (90 日 / 1 年 / no expiration)
# 2. repo secret に登録 — Settings → Secrets and variables → Actions → New repository
#    secret、 Name: `STATS_PUSH_TOKEN`、 Value: 上記 PAT
# 3. PAT は admin 権限を継承するので、 `enforce_admins: false` の bypass で push が
#    通る (status checks が走る前でも accept される)
#
# secret 未設定時は GITHUB_TOKEN で push を試みて失敗する。 その場合 contributor が
# 手元で `python tools/regen_stats.py && python tools/dedup_compat.py` を実行して
# 結果を `[skip stats]` 付き commit で push する形で代替可能。

on:
  push:
    branches: [master]
    paths:
      - 'core/**/*.toml'
      - 'rules/**/*.toml'
      - 'tests/corpus/**/*.toml'
      - 'tools/regen_stats.py'
      - 'tools/list_dups.py'
      - 'tools/dedup_compat.py'

permissions:
  contents: write

jobs:
  regen:
    name: dedup compat + STATS.md / STATS_DUPS.md 自動再生成
    if: "!contains(github.event.head_commit.message, '[skip stats]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # 後で `git push` するため fetch-depth=0 + token 必須。
          # PAT (`STATS_PUSH_TOKEN`) があれば優先、 無ければ `GITHUB_TOKEN` fallback
          # (後者は branch protection で reject されるが、 contributor 手動 push で代替可能)
          fetch-depth: 0
          token: ${{ secrets.STATS_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: dedup compat 異体字 entries (unihan + jukugo + works)
        run: python3 tools/dedup_compat.py

      - name: STATS.md 再生成
        run: python3 tools/regen_stats.py

      - name: STATS_DUPS.md 再生成 (cross-file 重複レポート)
        run: python3 tools/list_dups.py

      - name: diff があれば commit + push
        run: |
          if git diff --quiet; then
            echo "辞書 + STATS.md / STATS_DUPS.md ともに drift なし、 commit 不要"
            exit 0
          fi
          echo "drift detected, committing..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: dedup compat + regen STATS [skip stats]"
          git push
