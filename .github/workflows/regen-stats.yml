name: Dedup compat + Regen STATS.md / STATS_DUPS.md

# 辞書 (core/) / ルール (rules/) / 該当 tools/*.py のいずれかが master に push
# されたら、 順に:
#
#   1. compat 異体字 entries の dedup (unihan + jukugo + works)
#   2. STATS.md / STATS_DUPS.md の再生成
#
# を走らせて diff があれば一括 auto-commit する。 dedup は冪等で、 dead 経路の
# entries が無ければ no-op。
#
# bot 自身の commit は `[skip stats]` を含むので再 trigger されない
# (regen-stats.yml も validate.yml も skip)。 既存 commit に手で `[skip stats]` を
# 入れたい場合 (release commit 等) もスキップされる。
#
# ## branch protection bypass (administration: write による一時 lift)
#
# master の required_status_checks (4 個) は github-actions[bot] の push を
# bypass しない。 admin user の PAT を使う代替もあるが、 user 側に手作業が発生する。
#
# 代わりに **GITHUB_TOKEN の `administration: write` 権限** で master 保護の status
# checks を一時的に外し、 push 後に元に戻す方式を採用 (PAT 不要、 user 設定なし)。
# 一時的な race window (数秒間 master が無防備) はあるが、 single-maintainer の
# hobby project では許容範囲。 contributor の手動操作は無し。

on:
  push:
    branches: [master]
    paths:
      - 'core/**/*.toml'
      - 'rules/**/*.toml'
      - 'tests/corpus/**/*.toml'
      - 'tools/regen_stats.py'
      - 'tools/list_dups.py'
      - 'tools/dedup_compat.py'

permissions:
  contents: write          # commit + push
  administration: write    # branch protection の一時編集

jobs:
  regen:
    name: dedup compat + STATS.md / STATS_DUPS.md 自動再生成
    if: "!contains(github.event.head_commit.message, '[skip stats]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: dedup compat 異体字 entries (unihan + jukugo + works)
        run: python3 tools/dedup_compat.py

      - name: STATS.md 再生成
        run: python3 tools/regen_stats.py

      - name: STATS_DUPS.md 再生成 (cross-file 重複レポート)
        run: python3 tools/list_dups.py

      - name: drift 検知 → branch protection 一時 lift + push + 復元
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "辞書 + STATS.md / STATS_DUPS.md ともに drift なし、 commit 不要"
            exit 0
          fi
          echo "drift detected, committing..."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: dedup compat + regen STATS [skip stats]"

          # 1. branch protection の現状 (status checks 部分) を JSON で保存
          gh api "repos/${GITHUB_REPOSITORY}/branches/master/protection/required_status_checks" \
            > /tmp/protection_checks.json
          echo "Saved current protection settings:"
          cat /tmp/protection_checks.json

          # 2. status checks を一時的に外す (branch protection 全削除ではなく checks のみ)
          echo "Temporarily removing required_status_checks..."
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/branches/master/protection/required_status_checks"

          # 3. push (try-finally 的に PUSH 結果を記録)
          PUSH_OK=true
          git push origin master || PUSH_OK=false
          echo "Push result: $PUSH_OK"

          # 4. status checks を復元 (push 成否に関わらず必ず実行、 race window を最小化)
          echo "Restoring required_status_checks from backup..."
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/branches/master/protection/required_status_checks" \
            --input /tmp/protection_checks.json
          echo "Protection restored."

          # push が失敗してたら最終的に workflow を fail させる
          if [ "$PUSH_OK" != "true" ]; then
            echo "::error::push failed even with protection lifted; check logs above"
            exit 1
          fi
