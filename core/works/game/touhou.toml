# 東方Project (上海アリス幻樂団) のキャラクター名・場所・用語
#
# 出典:
# - 上海アリス幻樂団 公式 (http://www16.big.or.jp/~zun/)
# - 公式書籍『東方求聞史紀』『東方求聞口授』『東方文花帖』『東方香霖堂』等
# - 各作品の Music Room コメント / おまけ.txt の ZUN 自身の記述
#
# 採録方針:
# - **公式に読みが確定しているキャラ / 場所 / 用語のみ**
#   (二次創作読みやファン推測は除外)
# - 表層が完全に漢字のもの中心 (「鈴仙・優曇華院・イナバ」のような
#   カタカナ混じりは除外、「博麗霊夢」のような全漢字は OK)
# - **単漢字 (1 文字) は絶対に入れない** — unihan.toml と重複するため
# - 全 surface ≥2 文字
# - 50音順 (読みのカナ順) を推奨
#
# 構造方針:
# - フルネーム (e.g., 博麗霊夢) と姓単独 (e.g., 博麗) の両方を入れる
#   (「博麗の巫女」のように姓だけ書かれる文脈にも対応するため)
# - 場所 / 作品タイトル / 用語も同じファイルに混在 (作品 1 つで 1 ファイル方針)

[meta]
role = "works"
description = "東方Project (上海アリス幻樂団): キャラクター名 / 場所 / 用語 (公式読みベース)"

