# 「が無い/が無かった/がない/がなかった」 で否定 → 「ヒトケ」 (= 人気が無い場所)
# next_logical_token は char-class 連続を 1 pseudo-token として返すので、
# 「がない」 全体を next_eq_any で列挙する (= next_eq "が" だと "がない" ≠ "が" で失敗)
